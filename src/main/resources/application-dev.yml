spring:
  datasource:
    url: jdbc:h2:mem:goaldone;DB_CLOSE_DELAY=-1;MODE=PostgreSQL
    driver-class-name: org.h2.Driver
    username: sa
    password:

  h2:
    console:
      enabled: true
      path: /h2-console

  liquibase:
    change-log: classpath:db/changelog/db.changelog-master.yaml
    enabled: true

  jpa:
    show-sql: true

  # Start local mail catcher: docker run -d -p 1025:1025 -p 8025:8025 axllent/mailpit
  # View captured emails at: http://localhost:8025
  mail:
    host: localhost
    port: 1026
    properties:
      mail.smtp.auth: false
      mail.smtp.starttls.enable: false
      mail.smtp.starttls.required: false

app:
  frontend-url: http://localhost:4200
  jwt:
    cookie-secure: false
    cookie-same-site: Lax
  cors:
    allowed-origins: "http://localhost:4200"