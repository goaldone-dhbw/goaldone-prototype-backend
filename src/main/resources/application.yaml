spring:
  application:
    name: goaldone-backend
  config:
    import: "optional:file:./super-admins.yml"
  jpa:
    open-in-view: false
    hibernate:
      ddl-auto: validate

server:
  servlet:
    context-path: /api/v1

app:
  frontend-url: ${FRONTEND_URL:http://localhost:4200}
  jwt:
    secret: ${JWT_SECRET:dev-secret-key-replace-in-production-min-256-bits-extra-long-for-security}
    access-token-expiry: 900      # 15 minutes in seconds
    refresh-token-expiry: 604800  # 7 days in seconds
    cookie-secure: ${COOKIE_SECURE:true}
    cookie-same-site: ${COOKIE_SAME_SITE:Strict}
  cors:
    allowed-origins: ${CORS_ALLOWED_ORIGINS:http://localhost:4200}
    allowed-methods: GET,POST,PUT,PATCH,DELETE,OPTIONS
    allowed-headers: "*"
    allow-credentials: true
    max-age: 3600
  mail:
    from: ${EMAIL_FROM:noreply@goaldone.de}
    invitation-path: /auth/accept-invitation
    password-reset-path: /auth/reset-password
  scheduler:
    cleanup-cron: "0 0 2 * * *"
    invitation-cleanup-cron: "0 15 2 * * *"