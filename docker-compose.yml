services:
  postgres:
    image: postgres:16-alpine
    container_name: goaldone-postgres
    restart: always
    environment:
      POSTGRES_DB: ${DB_NAME:-goaldone}
      POSTGRES_USER: ${DB_USER:-goaldone}
      POSTGRES_PASSWORD: ${DB_PASSWORD:-goaldone-secret-pw}
    ports:
      - "5432:5432"
    volumes:
      - postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USER:-goaldone} -d ${DB_NAME:-goaldone}"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - zitadel

  backend:
    build: .
    container_name: goaldone-backend
    restart: always
    env_file:
      - .env
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      # Spring Profiles
      SPRING_PROFILES_ACTIVE: ${SPRING_PROFILES_ACTIVE:-prod}
      
      # Database
      SPRING_DATASOURCE_URL: jdbc:postgresql://postgres:5432/${DB_NAME:-goaldone}
      SPRING_DATASOURCE_USERNAME: ${DB_USER:-goaldone}
      SPRING_DATASOURCE_PASSWORD: ${DB_PASSWORD:-goaldone-secret-pw}
      
      # Security & JWT
      JWT_SECRET: ${JWT_SECRET}
      SUPER_ADMINS_FILE: ${SUPER_ADMINS_FILE:-/app/super-admins.yml}
      
      # Email
      SPRING_MAIL_HOST: ${SPRING_MAIL_HOST}
      SPRING_MAIL_PORT: ${SPRING_MAIL_PORT}
      SPRING_MAIL_USERNAME: ${SPRING_MAIL_USERNAME}
      SPRING_MAIL_PASSWORD: ${SPRING_MAIL_PASSWORD}
      SPRING_MAIL_PROPERTIES_MAIL_SMTP_SSL_TRUST: ${SPRING_MAIL_SSL_TRUST:-*}
      SPRING_MAIL_PROPERTIES_MAIL_SMTP_SSL_CHECK_IDENTITY: ${SPRING_MAIL_SSL_CHECK_IDENTITY:-false}
      EMAIL_FROM: ${EMAIL_FROM}
      
      # Server Config
      SERVER_PORT: ${SERVER_PORT:-8080}
      MANAGEMENT_SERVER_PORT: ${MANAGEMENT_SERVER_PORT:-8081}

      FRONTEND_URL: ${FRONTEND_URL}
      CORS_ALLOWED_ORIGINS: ${CORS_ALLOWED_ORIGINS}
      
    # Port 8080 is now exposed via Traefik on port 443
    ports:
      - "${MANAGEMENT_SERVER_PORT:-8081}:${MANAGEMENT_SERVER_PORT:-8081}"
    extra_hosts:
      - "host.docker.internal:host-gateway"
    volumes:
      - ./super-admins.yml:/app/super-admins.yml:ro
    healthcheck:
      test: ["CMD-SHELL", "wget --spider -q http://localhost:${MANAGEMENT_SERVER_PORT:-8081}/actuator/health || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 3
    networks:
      - zitadel
    labels:
      - "traefik.enable=true"
      - "traefik.docker.network=zitadel"
      - "traefik.http.services.goaldone-backend.loadbalancer.server.port=${SERVER_PORT:-8080}"
      
      # HTTP -> HTTPS Redirect
      - "traefik.http.middlewares.goaldone-redirect-https.redirectscheme.scheme=https"
      - "traefik.http.middlewares.goaldone-redirect-https.redirectscheme.permanent=true"
      
      # HTTP Router
      - "traefik.http.routers.goaldone-backend-web.rule=Host(`${API_DOMAIN:-prototyp-api.goaldone.de}`)"
      - "traefik.http.routers.goaldone-backend-web.entrypoints=web"
      - "traefik.http.routers.goaldone-backend-web.middlewares=goaldone-redirect-https"
      
      # HTTPS Router
      - "traefik.http.routers.goaldone-backend-websecure.rule=Host(`${API_DOMAIN:-prototyp-api.goaldone.de}`)"
      - "traefik.http.routers.goaldone-backend-websecure.entrypoints=websecure"
      - "traefik.http.routers.goaldone-backend-websecure.tls=true"
      - "traefik.http.routers.goaldone-backend-websecure.tls.certresolver=le"

volumes:
  postgres-data:

networks:
  zitadel:
    external: true
